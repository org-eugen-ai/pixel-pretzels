<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none">
  <!-- Pretzel-shaped badge -->
  <rect x="0" y="5" width="30" height="30" rx="6" fill="#C8842D"/>
  <!-- Pixel-style PP text -->
  <text x="4" y="26" font-family="monospace" font-size="16" font-weight="bold" fill="#FFFCF7" letter-spacing="-1">PP</text>
  <!-- Pixel dots decoration -->
  <rect x="25" y="8" width="3" height="3" fill="#3B82F6" rx="0.5"/>
  <rect x="25" y="28" width="3" height="3" fill="#3B82F6" rx="0.5"/>
  <!-- Brand name in monospace for pixel feel -->
  <text x="36" y="26" font-family="monospace" font-size="18" font-weight="bold" fill="#C8842D">Pixel Pretzels</text>
</svg>
